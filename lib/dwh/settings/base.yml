# Standard SQL aggregate functions. Presence of any of these in a formula marks
# the expression as a measure (re-aggregating). Per-adapter YAMLs extend with
# extra_aggregate_functions.
aggregate_functions:
  - sum
  - count
  - avg
  - min
  - max
  - median
  - mode
  - stddev
  - stddev_pop
  - stddev_samp
  - variance
  - var_pop
  - var_samp
  - array_agg
  - string_agg
  - listagg
  - bool_and
  - bool_or
  - every
  - bit_and
  - bit_or
  - count_if
  - percentile_cont
  - percentile_disc
  - corr
  - covar_pop
  - covar_samp
  - approx_distinct
  - approx_count_distinct
